version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: albasha_postgres
    environment:
      POSTGRES_USER: albasha
      POSTGRES_PASSWORD: albasha_dev
      POSTGRES_DB: albasha
    ports:
      - "45432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

volumes:
  pgdata:
    driver: local
